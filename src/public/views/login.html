<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="../css/login.css">
    <title>Inicio Sesion</title>
</head>

<body>
    <Main>
        <form action="/login" method="post" class="d-grid gap-5 p-5">
            <h1>Inicio de Sesión</h1>
            <div class="cont-input">
                <label for="email" class="form-label">Correo Electronico</label>
                <br>
                <input type="email" name="email" id="email" class="form-control" required>
            </div>
            <div class="cont-input">
                <label for="password" class="form-label">Contraseña</label>
                <input type="password" name="password" id="password" class="form-control" aria-describedby="passwordHelpBlock" required>
                <div id="passwordHelpBlock" class="form-text">
                    Tu contraseña debe de tener entre 8 y 10 caracteres
                </div>
            </div>
            <div class="cont-btns text-center d-flex flex-column gap-3">
                <button class="btn btn-outline-light" type="submit">Iniciar Sesión</button>
                <a href="/register" style="text-decoration: underline;">Registrarse</a>
            </div>
        </form>
    </Main>



    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
        integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js"
        integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y"
        crossorigin="anonymous"></script>
</body>

</html>
